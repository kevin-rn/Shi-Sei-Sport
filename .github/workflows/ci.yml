name: CI

on:
  push:
    branches: [main, release-*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            docker:
              - 'frontend/Dockerfile.og'
              - 'backend/Dockerfile'
              - 'caddy/Dockerfile'
              - 'caddy/Caddyfile'
              - 'docker-compose.yml'

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - run: npm ci
      - run: npm run build

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Audit frontend dependencies
        if: needs.changes.outputs.frontend == 'true'
        working-directory: frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Audit backend dependencies
        if: needs.changes.outputs.backend == 'true'
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

  docker:
    name: Docker Build
    needs: [changes, frontend, backend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile.og
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build caddy image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: caddy/Dockerfile
          push: false
          cache-from: type=gha,scope=caddy
          cache-to: type=gha,mode=max,scope=caddy

  trivy:
    name: Image Scan
    needs: [changes, frontend, backend]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -t shisei-frontend:scan -f frontend/Dockerfile.og .

      - name: Build backend image
        run: docker build -t shisei-backend:scan backend/

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shisei-frontend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Scan backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: shisei-backend:scan
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  deploy:
    name: Deploy
    needs: [frontend, backend, docker]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git pull origin main
            docker compose build --parallel
            docker compose up -d
            docker image prune -f
